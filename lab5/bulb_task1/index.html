<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lightbulb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Лампочка</h2>

<select id="type">
    <option value="normal">Звичайна</option>
    <option value="eco">Еко</option>
    <option value="led">LED</option>
</select>

<div class="lamp-container">
    <div id="lamp" class="lamp off"></div>
</div>

<button id="on">Включити</button>
<button id="off">Виключити</button>
<button id="bright">Яскравість</button>

<script src="script.js"></script>
</body>
</html>
