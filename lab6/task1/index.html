<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крамниця товарів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="header-wrap">
        <h1>My Shop</h1>
        <div id="total-cost" class="total-cost">Сума: 0 ₴</div>
    </div>
</header>

<main class="page-wrap">
    <aside class="sidebar">
        <div class="panel-block">
            <h3>Фільтр за категорією:</h3>
            <div id="filter-btns" class="btn-group"></div>
            <button id="btn-reset-filter" class="btn-outline">Скинути фільтр</button>
        </div>

        <div class="panel-block">
            <h3>Сортування:</h3>
            <div id="sort-btns" class="btn-group">
                <button data-sort="price">Сортувати за ціною</button>
                <button data-sort="dateCreated">Сортувати за датою створення</button>
                <button data-sort="dateUpdated">Сортувати за датою оновлення</button>
            </div>
            <button id="btn-reset-sort" class="btn-outline">Скинути сортування</button>
        </div>

        <button id="btn-open-form" class="btn-primary btn-add">+ Додати новий товар</button>
    </aside>

    <section id="items-list" class="items-grid"></section>
</main>

<div id="item-modal" class="modal-bg">
    <div class="modal-box">
        <h2 id="modal-heading">Додати новий товар</h2>
        <form id="item-form">
            <div class="field-group">
                <label for="inp-name">Назва товару:</label>
                <input type="text" id="inp-name" name="name" required minlength="2" placeholder="Введіть назву товару">
            </div>
            <div class="field-group">
                <label for="inp-price">Ціна (₴):</label>
                <input type="number" id="inp-price" name="price" required min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="field-group">
                <label for="inp-category">Категорія:</label>
                <input type="text" id="inp-category" name="category" required placeholder="Наприклад: Книги, Гаджети">
            </div>
            <div class="field-group">
                <label for="inp-image">URL зображення:</label>
                <input type="url" id="inp-image" name="image" placeholder="https://...">
            </div>
            <div class="form-footer">
                <button type="button" id="btn-close-form" class="btn-outline">Скасувати</button>
                <button type="submit" class="btn-primary">Зберегти</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-msg" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
